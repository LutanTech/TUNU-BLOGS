<!DOCTYPE html>
<html>
<head>
<title>Create</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#e2e8f0}
.container{max-width:700px;margin:auto;padding:20px}
input,textarea{width:100%;padding:10px;margin:8px 0;border:none;border-radius:8px}
button{padding:10px;background:#22c55e;border:none;border-radius:8px}
.card{background:#1e293b;padding:15px;border-radius:12px}
</style>
</head>
<body>

<div class="container">
<div class="card">
<h2>Create post</h2>

<form method="POST">
<input name="title" placeholder="title">
<input name="category" placeholder="category">
<textarea name="summary" placeholder="summary"></textarea>
<textarea name="content" placeholder="content"></textarea>
<button>publish</button>
</form>

</div>
</div>

</body>
</html>
