<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;display:flex;justify-content:center;align-items:center;height:100vh}
.box{background:#1e293b;padding:25px;border-radius:12px;width:300px}
input{width:100%;padding:10px;margin:8px 0;border:none;border-radius:8px}
button{width:100%;padding:10px;background:#22c55e;border:none;border-radius:8px}
h2{text-align:center}
</style>
</head>
<body>

<div class="box">
<h2>Create Account</h2>
<form method="POST">
<input name="username" placeholder="username">
<input name="email" placeholder="email">
<input name="password" type="password" placeholder="password">
<button>register</button>
</form>
</div>

</body>
</html>
